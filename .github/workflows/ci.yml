name: LinkTicNuxt CI Pipeline

# 1. El pipeline se ejecutará cuando hagas push a la rama principal
# o cuando crees un Pull Request.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-check:
    name: Build, Test & Type Check
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar tu código en el servidor de GitHub
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Preparar el entorno con Node.js 22 (Corregido para tu proyecto)
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Paso 3: Instalar dependencias
      - name: 📦 Instalar dependencias
        run: npm install

      # Paso 4: Revisar Linting (ESLint)
      - name: 🧹 Revisar Linting (ESLint)
        run: npm run lint
        continue-on-error: true

      # Paso 5: Generar los tipos de Nuxt y hacer Type Checking
      - name: 🏗️ Revisión de Tipos (TypeScript)
        run: npx nuxi typecheck

      # Paso 6: LA PRUEBA DE LOS TESTS 🧪
      # Aquí ejecutamos Vitest en modo "run" (una sola pasada, sin quedarse escuchando cambios)
      - name: 🧪 Ejecutar Tests Unitarios (Vitest)
        run: npx vitest run

      # Paso 7: LA PRUEBA DE FUEGO 🔥 (Construir la app)
      - name: 🚀 Construir aplicación (Nuxt Build)
        run: npm run build

      # Paso 8: Guardar el resultado
      - name: 💾 Guardar Artefacto de Build
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-build-output
          path: .output/
          retention-days: 7